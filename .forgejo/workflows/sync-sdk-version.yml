name: Sync SDK Version

on:
    push:
        branches:
            - "**"

jobs:
    sync-version:
        runs-on: codeberg-small
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: https://github.com/actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: https://github.com/actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Sync package versions from generated SDK
              run: |
                  node - <<'NODE'
                  const fs = require('node:fs');
                  const runtime = fs.readFileSync('src/runtime.ts', 'utf8');
                  const m = runtime.match(/The version of the OpenAPI document:\s*([^\s*]+)/);
                  if (!m || !m[1]) {
                    throw new Error('Cannot find generated OpenAPI version in src/runtime.ts');
                  }
                  const v = m[1].trim();

                  const pkgPath = 'package.json';
                  const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
                  pkg.version = v;
                  fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');

                  const lockPath = 'package-lock.json';
                  if (fs.existsSync(lockPath)) {
                    const lock = JSON.parse(fs.readFileSync(lockPath, 'utf8'));
                    lock.version = v;
                    if (lock.packages && lock.packages['']) {
                      lock.packages[''].version = v;
                      if (pkg.name) lock.packages[''].name = pkg.name;
                    }
                    fs.writeFileSync(lockPath, JSON.stringify(lock, null, 2) + '\n');
                  }

                  console.log(`Synced package version to ${v}`);
                  NODE

            - name: Commit version sync if changed
              run: |
                  if git diff --quiet -- package.json package-lock.json; then
                    echo "No version changes to commit"
                    exit 0
                  fi

                  git config user.email "ci@noreply.codeberg.org"
                  git config user.name "Forgejo CI"
                  git add package.json package-lock.json
                  git commit -m "chore: sync sdk version from generated sources"
                  git push
