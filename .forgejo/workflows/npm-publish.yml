name: NPM Publish on Tag

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

jobs:
  publish:
    runs-on: codeberg-small

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Setup Node.js
        uses: https://github.com/actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm whoami
          npm ping

      - name: Set package version from tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          export TAG_VERSION
          echo "TAG_VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

          node - <<'NODE'
          const fs = require('node:fs');
          const version = process.env.TAG_VERSION;
          if (!version) throw new Error('TAG_VERSION is empty');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = version;
          pkg.private = false;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');

          const lockPath = 'package-lock.json';
          if (fs.existsSync(lockPath)) {
            const lock = JSON.parse(fs.readFileSync(lockPath, 'utf8'));
            lock.version = version;
            if (lock.packages && lock.packages['']) {
              lock.packages[''].version = version;
            }
            fs.writeFileSync(lockPath, JSON.stringify(lock, null, 2) + '\n');
          }

          console.log(`Prepared publish version ${version}`);
          NODE

      - name: Check version is not already published
        run: |
          if npm view "@ce-rise/hex-core-sdk-typescript@$TAG_VERSION" version >/dev/null 2>&1; then
            echo "Version $TAG_VERSION is already published on npm."
            exit 1
          fi
          echo "Version $TAG_VERSION is not published yet."

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
